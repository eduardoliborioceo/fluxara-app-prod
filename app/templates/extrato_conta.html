{% extends "layouts/app.html" %}
{% block title %}Fluxara · {{ conta_nome }}{% endblock %}
{% block page_title %}{{ conta_nome }}{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/extrato.css') }}?v={{ static_v }}">

<div id="extratoConfig"
     data-id="{{ conta_id }}"
     data-nome="{{ conta_nome }}"
     data-instituicao="{{ conta_instituicao }}"
     style="display:none"></div>

<div class="extrato-page-header">
  <a href="{{ url_for('pages.resumo') }}" class="extrato-back-btn">
    <i class="bi bi-arrow-left"></i>
  </a>
  <div class="extrato-header-info">
    <div class="extrato-header-logo" id="extratoLogo"></div>
    <div style="min-width:0">
      <div class="extrato-header-nome">{{ conta_nome }}</div>
      <div class="extrato-header-saldo" id="extratoSaldoInfo"></div>
    </div>
  </div>
</div>

<div class="container-fluid px-3" style="max-width:680px;padding-bottom:100px;">

  <div class="mes-filtro">
    <button id="btnMesAnterior" title="Mês anterior">
      <i class="bi bi-chevron-left"></i>
    </button>
    <span class="mes-label" id="mesLabel"></span>
    <button id="btnMesPosterior" title="Próximo mês">
      <i class="bi bi-chevron-right"></i>
    </button>
  </div>

  <div class="extrato-filtros">
    <div class="extrato-filtro-status">
      <button class="extrato-status-pill active" data-status="todas">Todas</button>
      <button class="extrato-status-pill" data-status="efetivadas">Efetivadas</button>
      <button class="extrato-status-pill" data-status="pendentes">Pendentes</button>
      <button class="extrato-status-pill extrato-select-toggle" id="btnSelectMode">
        <i class="bi bi-check2-square me-1"></i>Selecionar
      </button>
    </div>
    <div class="extrato-filtro-datas">
      <div class="extrato-data-field">
        <label class="extrato-data-label">De</label>
        <input type="date" id="filtroDataDe" class="extrato-data-input">
      </div>
      <div class="extrato-data-field">
        <label class="extrato-data-label">Até</label>
        <input type="date" id="filtroDataAte" class="extrato-data-input">
      </div>
      <button class="extrato-filtro-limpar" id="btnLimparFiltro" title="Limpar datas">
        <i class="bi bi-x"></i>
      </button>
    </div>
  </div>

  <div class="extrato-card" id="extratoBody">
    <div class="text-center py-4 text-muted small">
      <i class="bi bi-inbox d-block mb-1" style="font-size:1.8rem;opacity:.3"></i>
      Carregando...
    </div>
  </div>

</div>

<!-- ====== EDIT SHEET ====== -->
<div class="edit-sheet-backdrop" id="editBackdrop">
  <div class="edit-sheet">
    <div class="edit-sheet-handle"></div>
    <div class="edit-sheet-title-row">
      <div class="edit-sheet-type-icon" id="editTypeIcon">
        <i class="bi bi-arrow-down-circle-fill" id="editTypeIconI"></i>
      </div>
      <div class="edit-sheet-title" id="editSheetTitle">Editar</div>
      <button class="edit-sheet-close" id="editSheetClose">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="edit-sheet-body" id="editSheetBody">

      <input type="hidden" id="editId">
      <input type="hidden" id="editTipo">

      <div class="edit-field" id="editFieldDescricao">
        <label class="edit-label">Descrição</label>
        <input type="text" id="editDescricao" class="edit-input" placeholder="Descrição...">
      </div>

      <div class="edit-field" id="editFieldValor">
        <label class="edit-label">Valor</label>
        <div class="edit-valor-wrap">
          <span class="edit-currency">R$</span>
          <input type="number" id="editValor" class="edit-valor-input" placeholder="0,00" step="0.01" min="0">
        </div>
      </div>

      <div class="edit-field" id="editFieldData">
        <label class="edit-label">Data de Vencimento</label>
        <input type="date" id="editData" class="edit-input">
      </div>

      <div class="edit-field" id="editFieldStatus">
        <label class="edit-label">Status</label>
        <div class="edit-status-toggle">
          <button type="button" class="edit-status-btn" id="editBtnEfetivado">
            <i class="bi bi-check-circle"></i> Efetivada
          </button>
          <button type="button" class="edit-status-btn" id="editBtnPendente">
            <i class="bi bi-clock"></i> Pendente
          </button>
        </div>
        <input type="hidden" id="editEfetivado" value="true">
      </div>

      <div class="edit-field" id="editFieldCategoria">
        <label class="edit-label">Categoria</label>
        <select id="editCategoria" class="edit-select">
          <option value="">Sem categoria</option>
        </select>
      </div>

      <div class="edit-field" id="editFieldSubcategoria" style="display:none">
        <label class="edit-label">Subcategoria</label>
        <select id="editSubcategoria" class="edit-select">
          <option value="">Sem subcategoria</option>
        </select>
      </div>

      <div class="edit-field" id="editFieldTransfInfo" style="display:none">
        <label class="edit-label">Transferência</label>
        <div class="edit-info-row">
          <i class="bi bi-arrow-left-right"></i>
          <span id="editTransfInfo"></span>
        </div>
      </div>

      <div class="edit-actions">
        <button type="button" class="edit-btn-delete" id="editBtnDelete">
          <i class="bi bi-trash"></i> Excluir
        </button>
        <button type="button" class="edit-btn-save" id="editBtnSave">
          Salvar alterações
        </button>
      </div>

      <div class="edit-delete-confirm" id="editDeleteConfirm">
        <div id="editDeleteScope" class="edit-scope-picker" style="display:none">
          <div class="edit-scope-label">Excluir qual ocorrência?</div>
          <label class="edit-scope-option">
            <input type="radio" name="deleteEscopo" value="este" checked> Somente esta
          </label>
          <label class="edit-scope-option">
            <input type="radio" name="deleteEscopo" value="futuros"> Esta e as seguintes
          </label>
          <label class="edit-scope-option">
            <input type="radio" name="deleteEscopo" value="todos"> Todas da série
          </label>
        </div>
        <div class="edit-delete-confirm-text">
          <i class="bi bi-exclamation-triangle-fill"></i>
          Confirmar exclusão?
        </div>
        <div class="edit-delete-confirm-btns">
          <button type="button" class="edit-btn-cancel-delete" id="editBtnCancelDelete">Cancelar</button>
          <button type="button" class="edit-btn-confirm-delete" id="editBtnConfirmDelete">Excluir</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="extrato-sum-bar" id="extratoSumBar" style="display:none">
  <div class="extrato-sum-info">
    <span id="extratoSumCount" class="extrato-sum-count"></span>
    <span id="extratoSumTotal" class="extrato-sum-total"></span>
  </div>
  <button id="extratoSumClear" class="extrato-sum-clear" title="Limpar seleção">
    <i class="bi bi-x-lg"></i>
  </button>
</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/extrato_conta.js') }}?v={{ static_v }}"></script>
{% endblock %}
