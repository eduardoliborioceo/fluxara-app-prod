{% extends "layouts/app.html" %}
{% block title %}Fluxara · Assinaturas{% endblock %}

{% block page_title %}
<div class="d-flex align-items-center w-100">
  <span class="me-auto">Assinaturas</span>
  <a href="{{ url_for('auth.my_profile') }}" class="btn btn-outline-secondary ms-auto">
    <i class="bi bi-arrow-left"></i> Voltar
  </a>
</div>
{% endblock %}

{% block content %}
<div class="card shadow-sm p-4 text-center" style="max-width: 520px">
  <i class="bi bi-star-fill text-warning" style="font-size: 3rem;"></i>
  <h4 class="mt-3 mb-2">Assinaturas</h4>
  <p class="text-muted">Os planos de assinatura estarão disponíveis em breve.</p>
  <a href="{{ url_for('auth.my_profile') }}" class="btn btn-outline-secondary mt-2">
    Voltar ao perfil
  </a>
</div>
{% endblock %}
