{% extends "layouts/auth.html" %}
{% block title %}Entrar{% endblock %}
{% block content %}
<section class="mobile-screen login-form"
  style="background-image:url('{{ url_for('static', filename='images/banners/bg-log-pass.webp') }}?v={{ static_v }}')">

  <form method="post"
        action="{{ url_for('auth.login_local') }}"
        class="mobile-form">

    <button
      id="install-app-btn"
      type="button"
      class="btn btn-outline-dark w-100 mb-3 d-none d-inline-flex align-items-center justify-content-center gap-2"
      aria-hidden="true"
    >
      <img
        src="{{ url_for('static', filename='images/logos/pwa-192.png') }}?v={{ static_v }}"
        alt="Fluxara"
        width="18"
        height="18"
        style="border-radius:4px;"
      >
      <span>Instalar aplicativo</span>
    </button>

    <div class="input-group mb-3 auth-input">
      <span class="input-group-text">
        <i class="bi bi-person"></i>
      </span>
      <input name="username" class="form-control" placeholder="Usuário" required>
    </div>

    <div class="input-group mb-3 auth-input">
      <span class="input-group-text">
        <i class="bi bi-lock"></i>
      </span>
      <input type="password" name="password" id="mobileLoginPassword" class="form-control" placeholder="Senha" required>
      <button type="button" class="input-group-text auth-eye-btn" id="toggleMobilePassword" tabindex="-1" title="Mostrar/ocultar senha">
        <i class="bi bi-eye" id="toggleMobilePasswordIcon"></i>
      </button>
    </div>

    <button class="btn btn-primary w-100 mb-3">
      Entrar
    </button>

    <div class="text-center mb-3">
      <a href="{{ url_for('auth.forgot_password') }}"
         class="btn btn-link p-0">
        Esqueci minha senha
      </a>
    </div>

    <div class="auth-oauth-divider auth-oauth-divider--dark">
      <span>ou continue com</span>
    </div>

    <div class="d-flex justify-content-center gap-3 mb-2">
      <a href="{{ url_for('auth.login_google') }}" class="auth-oauth-circle auth-oauth-circle--google" title="Logar com Google">
        <i class="bi bi-google"></i>
      </a>
      <a href="{{ url_for('auth.login_github') }}" class="auth-oauth-circle auth-oauth-circle--github" title="Logar com GitHub">
        <i class="bi bi-github"></i>
      </a>
    </div>

  </form>
</section>

<script>
(function () {
  var btn = document.getElementById('toggleMobilePassword');
  var input = document.getElementById('mobileLoginPassword');
  var icon = document.getElementById('toggleMobilePasswordIcon');
  if (!btn || !input || !icon) return;
  btn.addEventListener('click', function () {
    var visible = input.type === 'text';
    input.type = visible ? 'password' : 'text';
    icon.className = visible ? 'bi bi-eye' : 'bi bi-eye-slash';
  });
})();
</script>

{% endblock %}
