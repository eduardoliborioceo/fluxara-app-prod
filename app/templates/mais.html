{% extends "layouts/app.html" %}
{% block title %}Fluxara · Mais{% endblock %}

{% block page_title %}
<div class="page-header">
  <div class="page-header-title">
    <span class="page-header-section">Menu</span>
    <h1 class="page-header-name">Mais</h1>
  </div>
</div>
{% endblock %}

{% block content %}
<div class="mais-page-wrapper">

  <div class="mais-page-section-label">Ferramentas</div>
  <div class="mais-page-grid">

    <a href="{{ url_for('pages.minha_saude') }}" class="mais-page-card">
      <span class="mais-page-card-icon" style="background:#f0fdf4;color:#16a34a">
        <i class="bi bi-heart-pulse-fill"></i>
      </span>
      <span class="mais-page-card-label">Minha Saúde</span>
    </a>

    <a href="{{ url_for('pages.treino') }}" class="mais-page-card">
      <span class="mais-page-card-icon" style="background:#fdf4ff;color:#9333ea">
        <i class="bi bi-activity"></i>
      </span>
      <span class="mais-page-card-label">Treino</span>
    </a>

    <a href="{{ url_for('pages.surebet') }}" class="mais-page-card">
      <span class="mais-page-card-icon" style="background:#f0f9ff;color:#0284c7">
        <i class="bi bi-calculator-fill"></i>
      </span>
      <span class="mais-page-card-label">Surebet</span>
    </a>

    <a href="{{ url_for('pages.apostas') }}" class="mais-page-card">
      <span class="mais-page-card-icon" style="background:#fefce8;color:#ca8a04">
        <i class="bi bi-trophy-fill"></i>
      </span>
      <span class="mais-page-card-label">Apostas</span>
    </a>

    <a href="{{ url_for('pages.calculadoras') }}" class="mais-page-card">
      <span class="mais-page-card-icon" style="background:#ecfdf5;color:#059669">
        <i class="bi bi-calculator-fill"></i>
      </span>
      <span class="mais-page-card-label">Calculadoras</span>
    </a>

    <a href="{{ url_for('pages.curriculo') }}" class="mais-page-card">
      <span class="mais-page-card-icon" style="background:#f0f9ff;color:#0369a1">
        <i class="bi bi-file-person-fill"></i>
      </span>
      <span class="mais-page-card-label">Currículo</span>
    </a>

  </div>

  <div class="mais-page-section-label">Sistema</div>
  <div class="mais-page-grid">

    <a href="{{ url_for('dev.painel') }}" class="mais-page-card">
      <span class="mais-page-card-icon" style="background:#eff6ff;color:#2563eb">
        <i class="bi bi-code-square"></i>
      </span>
      <span class="mais-page-card-label">Desenvolvedor</span>
    </a>

    <a href="{{ url_for('pages.suporte') }}" class="mais-page-card">
      <span class="mais-page-card-icon" style="background:#fff7ed;color:#ea580c">
        <i class="bi bi-headset"></i>
      </span>
      <span class="mais-page-card-label">Suporte</span>
    </a>

    <a href="{{ url_for('pages.configuracoes') }}" class="mais-page-card">
      <span class="mais-page-card-icon" style="background:#f0fdf4;color:#16a34a">
        <i class="bi bi-gear-fill"></i>
      </span>
      <span class="mais-page-card-label">Configurações</span>
    </a>

  </div>

</div>
{% endblock %}
