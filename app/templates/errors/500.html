<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Fluxara · Instabilidade temporária</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .error-card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid rgba(15,23,42,0.09);
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .error-icon {
      width: 72px;
      height: 72px;
      background: #fff3cd;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 2rem;
      color: #f59e0b;
    }
    .error-code {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
    }
    p {
      color: #64748b;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 0;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      padding: 10px 24px;
      background: #0d6efd;
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-back:hover {
      background: #0b5ed7;
      color: #fff;
    }
    .status-badge {
      display: inline-block;
      margin-top: 20px;
      background: #f1f5f9;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.78rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon">
      <i class="bi bi-tools"></i>
    </div>
    <div class="error-code">Erro 500</div>
    <h1>Ops, algo deu errado</h1>
    <p>
      O sistema encontrou um problema inesperado e já estamos sendo notificados.
      Nossa equipe está verificando o que aconteceu.
    </p>
    <p class="mt-2">
      Aguarde alguns instantes e tente novamente. Se o problema persistir,
      entre em contato pelo suporte.
    </p>
    <a href="/" class="btn-back">
      <i class="bi bi-arrow-left"></i>
      Voltar ao início
    </a>
    <div class="status-badge">
      <i class="bi bi-clock me-1"></i> Trabalhando na solução
    </div>
  </div>
</body>
</html>
